name: prime_server macos
on: [pull_request]

jobs:
  build:
    name: build and test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive
      - name: dependencies
        shell: bash
        run: |
          brew update
          brew install pkg-config zeromq czmq
      - name: build
        shell: bash
        run: |
          xcrun --show-sdk-path
          SDK_PATH=$(find /Library/Developer/CommandLineTools/SDKs/MacOSX*.sdk -type d -maxdepth 0 | tail -n 1)
          echo ${SDK_PATH}
          cmake . -DCMAKE_BUILD_TYPE=RelWithDebInfo -DENABLE_SANITIZERS=On -DCMAKE_OSX_SYSROOT=${SDK_PATH} -DENABLE_WERROR=Off && make all -j$(sysctl -n hw.ncpu)
      - name: test
        shell: bash
        run: |
          make test -j$(sysctl -n hw.ncpu)

      - name: smoke test (start server, request, graceful shutdown)
        shell: bash
        run: |
          ./prime_echod tcp://*:8002 1 1 &
          SERVER_PID=$!
          sleep 1

          CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8002/test)
          if [ "$CODE" != "200" ]; then
            kill -9 $SERVER_PID
            echo "Expected 200, got $CODE" && exit 1
          fi
          echo "request returned $CODE"

          kill -TERM $SERVER_PID
          sleep 2
          if kill -0 $SERVER_PID 2>/dev/null; then
            kill -9 $SERVER_PID
            echo "Server did not shut down gracefully within 2 seconds" && exit 1
          fi
          echo "server shut down gracefully"
