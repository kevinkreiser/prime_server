name: prime_server linux
on: [pull_request]

jobs:
  build:
    name: build and test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive
      - name: dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y -qq make cmake gcc g++ libcurl4-openssl-dev libzmq3-dev libczmq-dev
      - name: build
        shell: bash
        run: |
          export LD_LIBRARY_PATH=.:$(cat /etc/ld.so.conf.d/* | grep -vF "#" | tr "\\n" ":" | sed -e "s/:$//g")
          cmake . -DCMAKE_BUILD_TYPE=RelWithDebInfo -DENABLE_SANITIZERS=On && make all -j$(nproc)
      - name: test
        shell: bash
        run: |
          export LD_LIBRARY_PATH=.:$(cat /etc/ld.so.conf.d/* | grep -vF "#" | tr "\\n" ":" | sed -e "s/:$//g")
          make test -j$(nproc)

      - name: smoke test (start server, request, graceful shutdown)
        shell: bash
        run: |
          export LD_LIBRARY_PATH=.:$(cat /etc/ld.so.conf.d/* | grep -vF "#" | tr "\\n" ":" | sed -e "s/:$//g")
          ./prime_echod tcp://*:8002 1 1 &
          SERVER_PID=$!
          sleep 1

          CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8002/test)
          if [ "$CODE" != "200" ]; then
            kill -9 $SERVER_PID
            echo "Expected 200, got $CODE" && exit 1
          fi
          echo "request returned $CODE"

          kill -TERM $SERVER_PID
          sleep 2
          if kill -0 $SERVER_PID 2>/dev/null; then
            kill -9 $SERVER_PID
            echo "Server did not shut down gracefully within 2 seconds" && exit 1
          fi
          echo "server shut down gracefully"
